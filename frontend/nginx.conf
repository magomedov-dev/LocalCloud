# Статический сервер для LocalCloud SPA.
# Приложение раздаётся за gateway nginx.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Долгое кеширование ассетов с fingerprint-именами,
    # которые генерируются Vite.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Fallback для SPA History API:
    # любой неизвестный путь возвращает index.html,
    # чтобы React Router мог обработать клиентские маршруты
    # (/files, /trash, /share/:token и т. д.).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html нельзя кешировать,
    # чтобы новые деплои подхватывались сразу.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
