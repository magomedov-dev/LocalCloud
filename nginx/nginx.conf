# ── Gateway LocalCloud ───────────────────────────────────────────────────────
# Всё раздаётся с одного origin на порту 80,
# поэтому браузер не выполняет cross-origin запросы
# и CORS preflight не требуется:
#   /                       → SPA через frontend-сервис
#   /api/…                  → FastAPI через api-сервис
#   /localcloud-…/…         → объектное хранилище MinIO
#                              для presigned upload/download URL

upstream localcloud_api      { server api:8000; }
upstream localcloud_frontend { server frontend:80; }
upstream localcloud_minio    { server minio:9000; }

server {
    listen 80;
    server_name _;

    # Небольшие тела JSON API.
    # Тяжёлый файловый трафик ниже идёт напрямую в MinIO.
    client_max_body_size 50m;

    # ── Заголовки безопасности ─────────────────────────────────────────────
    # Применяются ко ВСЕМ ответам (флаг always — в т.ч. к 4xx/5xx и
    # проксируемым ответам). Ни один location ниже не задаёт собственный
    # add_header, поэтому серверные заголовки не перекрываются.
    #
    # Это единственный origin, который видит браузер, поэтому защита ставится
    # здесь, а не на внутренних сервисах.
    add_header X-Frame-Options "DENY" always;            # анти-clickjacking (legacy)
    add_header X-Content-Type-Options "nosniff" always;  # без MIME-sniffing
    add_header Referrer-Policy "no-referrer" always;     # presigned URL не утекают в Referer
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=(), usb=()" always;

    # Content-Security-Policy. Подобрана под этот SPA (Vite + React + Radix):
    #   script-src — бандл same-origin + sha256 инлайн-скрипта темы из
    #     index.html (см. frontend/index.html; при его изменении обновите хэш —
    #     это проверяет тест frontend/tests/security/csp.test.ts);
    #   style-src 'unsafe-inline' — Radix/shadcn задают инлайн-стили позиционирования;
    #   fonts.googleapis.com / fonts.gstatic.com — подключённый шрифт DM Sans;
    #   img/media/frame blob: — превью PDF (iframe на blob:) и object-URL медиа;
    #   connect-src 'self' — API и presigned-объекты идут через этот же origin;
    #   frame-ancestors 'none' — приложение нельзя встроить в чужой фрейм.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-YRFH/qEY7XZSpK0YuNyxQgheggnnHnSRkrmCyEloL0c='; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; media-src 'self' blob:; frame-src 'self' blob:; connect-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # ── REST API ─────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://localcloud_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # ── Объектное хранилище: presigned GET/PUT в MinIO ──────────────────────
    # Backend подписывает presigned URL для ВНУТРЕННЕГО endpoint:
    # minio:9000.
    #
    # SigV4-подпись учитывает заголовок Host,
    # поэтому нужно прокидывать ровно этот Host.
    # Иначе MinIO вернёт SignatureDoesNotMatch.
    #
    # Браузер при этом видит только origin gateway.
    #
    # ВАЖНО: Host ниже должен совпадать с MINIO_HOST:MINIO_PORT,
    # которые использует backend.
    location ~ ^/(localcloud-files|localcloud-temp|localcloud-archives)/ {
        proxy_pass http://localcloud_minio;
        proxy_http_version 1.1;
        proxy_set_header Host              minio:9000;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Стримим большие multipart uploads/downloads
        # без буферизации и ограничений по размеру.
        client_max_body_size      0;
        proxy_request_buffering   off;
        proxy_buffering           off;
        proxy_connect_timeout     300s;
        proxy_send_timeout        300s;
        proxy_read_timeout        300s;
    }

    # ── SPA: статический frontend с fallback для History API ────────────────
    location / {
        proxy_pass http://localcloud_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
